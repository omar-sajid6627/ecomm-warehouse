version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eco_db
      POSTGRES_USER: eco_user
      POSTGRES_PASSWORD: eco_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eco_user -d eco_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-1:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: backend-1
    environment:
      DATABASE_URL: postgres://eco_user:eco_pass@postgres:5432/eco_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_super_secret_change_me
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-2:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: backend-2
    environment:
      DATABASE_URL: postgres://eco_user:eco_pass@postgres:5432/eco_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_super_secret_change_me
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      INTERNAL_API_URL: http://nginx:80/api
      PORT: 3000
    depends_on:
      backend-1:
        condition: service_started
      backend-2:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nginx
    ports:
      - "8080:80"
    depends_on:
      frontend:
        condition: service_started
      backend-1:
        condition: service_started
      backend-2:
        condition: service_started
    restart: unless-stopped

  db-init:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgres://eco_user:eco_pass@postgres:5432/eco_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_super_secret_change_me
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      node -e "require('reflect-metadata'); const { AppDataSource } = require('./dist/data-source'); AppDataSource.initialize().then(() => AppDataSource.synchronize(true)).then(() => AppDataSource.destroy()).catch((e)=>{console.error(e); process.exit(1);});"
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgres://eco_user:eco_pass@postgres:5432/eco_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_super_secret_change_me
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    command: node dist/seeds/seed.js
    restart: "no"

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

volumes:
  pgdata:
  redisdata:
